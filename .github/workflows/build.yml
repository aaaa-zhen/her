name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # === Standalone binaries (no Tauri, all platforms) ===
  build-standalone:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile || bun install

      - name: Generate embedded HTML
        run: node -e "const h=require('fs').readFileSync('public/index.html','utf-8');require('fs').writeFileSync('lib/embedded-html.js','module.exports='+JSON.stringify(h)+';\n');"

      - name: Build all platforms
        run: |
          mkdir -p dist
          bun build --compile app.js --target=bun-darwin-arm64 --external playwright --external playwright-core --external electron --outfile dist/her-mac-arm64
          bun build --compile app.js --target=bun-darwin-x64 --external playwright --external playwright-core --external electron --outfile dist/her-mac-x64
          bun build --compile app.js --target=bun-windows-x64 --external playwright --external playwright-core --external electron --outfile dist/her-windows.exe
          bun build --compile app.js --target=bun-linux-x64 --external playwright --external playwright-core --external electron --outfile dist/her-linux

      - name: Upload standalone binaries
        uses: actions/upload-artifact@v4
        with:
          name: standalone-binaries
          path: dist/

  # === Tauri desktop app (macOS Apple Silicon) ===
  build-tauri-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable

      - run: bun install --frozen-lockfile || bun install

      - name: Generate embedded HTML
        run: node -e "const h=require('fs').readFileSync('public/index.html','utf-8');require('fs').writeFileSync('lib/embedded-html.js','module.exports='+JSON.stringify(h)+';\n');"

      - name: Create Tauri frontend dist
        run: |
          mkdir -p dist
          echo '<!DOCTYPE html><html><head><meta charset="utf-8"><title>Her</title><style>body{margin:0;background:#0a0a0a;height:100vh}</style></head><body></body></html>' > dist/index.html

      - name: Compile sidecar
        run: |
          mkdir -p src-tauri/binaries
          bun build --compile app.js \
            --external playwright --external playwright-core --external electron \
            --outfile src-tauri/binaries/her-sidecar-aarch64-apple-darwin

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Build Tauri DMG
        run: cargo tauri build --bundles dmg

      - name: Upload Tauri DMG
        uses: actions/upload-artifact@v4
        with:
          name: tauri-macos-arm64
          path: src-tauri/target/release/bundle/dmg/*.dmg

  # === Tauri desktop app (Windows) ===
  build-tauri-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable

      - run: bun install --frozen-lockfile || bun install

      - name: Generate embedded HTML
        run: node -e "const h=require('fs').readFileSync('public/index.html','utf-8');require('fs').writeFileSync('lib/embedded-html.js','module.exports='+JSON.stringify(h)+';\n');"

      - name: Create Tauri frontend dist
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Set-Content -Path dist/index.html -Value '<!DOCTYPE html><html><head><meta charset="utf-8"><title>Her</title><style>body{margin:0;background:#0a0a0a;height:100vh}</style></head><body></body></html>'

      - name: Compile sidecar
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri/binaries
          bun build --compile app.js --external playwright --external playwright-core --external electron --outfile src-tauri/binaries/her-sidecar-x86_64-pc-windows-msvc.exe

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Build Tauri NSIS installer
        run: cargo tauri build --bundles nsis

      - name: Upload Tauri Windows
        uses: actions/upload-artifact@v4
        with:
          name: tauri-windows
          path: src-tauri/target/release/bundle/nsis/*.exe

  # === Release ===
  release:
    needs: [build-standalone, build-tauri-macos, build-tauri-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Collect release files
        run: |
          mkdir -p release
          cp artifacts/standalone-binaries/* release/
          cp artifacts/tauri-macos-arm64/*.dmg release/ 2>/dev/null || true
          cp artifacts/tauri-windows/*.exe release/ 2>/dev/null || true
          ls -lh release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
