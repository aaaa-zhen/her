name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # === Standalone binaries (no Tauri, all platforms) ===
  build-standalone:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile || bun install

      - name: Generate embedded HTML
        run: node -e "const h=require('fs').readFileSync('public/index.html','utf-8');require('fs').writeFileSync('lib/embedded-html.js','module.exports='+JSON.stringify(h)+';\n');"

      - name: Build all platforms
        run: |
          mkdir -p dist
          bun build --compile app.js --target=bun-darwin-arm64 --external playwright --external playwright-core --external electron --outfile dist/her-mac-arm64
          bun build --compile app.js --target=bun-darwin-x64 --external playwright --external playwright-core --external electron --outfile dist/her-mac-x64
          bun build --compile app.js --target=bun-windows-x64 --external playwright --external playwright-core --external electron --outfile dist/her-windows.exe
          bun build --compile app.js --target=bun-linux-x64 --external playwright --external playwright-core --external electron --outfile dist/her-linux

      - name: Upload standalone binaries
        uses: actions/upload-artifact@v4
        with:
          name: standalone-binaries
          path: dist/

  # === Tauri desktop app (macOS) ===
  build-tauri-macos:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
          - target: x86_64-apple-darwin
            runner: macos-13
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - run: bun install --frozen-lockfile || bun install

      - name: Generate embedded HTML
        run: node -e "const h=require('fs').readFileSync('public/index.html','utf-8');require('fs').writeFileSync('lib/embedded-html.js','module.exports='+JSON.stringify(h)+';\n');"

      - name: Compile sidecar
        run: |
          mkdir -p src-tauri/binaries
          bun build --compile app.js \
            --external playwright --external playwright-core --external electron \
            --outfile src-tauri/binaries/her-sidecar-${{ matrix.target }}

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Build Tauri DMG
        run: cargo tauri build --target ${{ matrix.target }} --bundles dmg

      - name: Collect artifacts
        run: |
          mkdir -p dist
          cp src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg dist/

      - name: Upload Tauri DMG
        uses: actions/upload-artifact@v4
        with:
          name: tauri-macos-${{ matrix.target }}
          path: dist/*.dmg

  # === Tauri desktop app (Windows) ===
  build-tauri-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable

      - run: bun install --frozen-lockfile || bun install

      - name: Generate embedded HTML
        run: node -e "const h=require('fs').readFileSync('public/index.html','utf-8');require('fs').writeFileSync('lib/embedded-html.js','module.exports='+JSON.stringify(h)+';\n');"

      - name: Compile sidecar
        run: |
          mkdir -p src-tauri/binaries
          bun build --compile app.js --external playwright --external playwright-core --external electron --outfile src-tauri/binaries/her-sidecar-x86_64-pc-windows-msvc.exe

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Build Tauri NSIS installer
        run: cargo tauri build --bundles nsis

      - name: Collect artifacts
        run: |
          mkdir -p dist
          cp src-tauri/target/release/bundle/nsis/*.exe dist/

      - name: Upload Tauri Windows
        uses: actions/upload-artifact@v4
        with:
          name: tauri-windows
          path: dist/*.exe

  # === Release ===
  release:
    needs: [build-standalone, build-tauri-macos, build-tauri-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Collect release files
        run: |
          mkdir -p release
          cp artifacts/standalone-binaries/* release/
          cp artifacts/tauri-macos-*/*.dmg release/ 2>/dev/null || true
          cp artifacts/tauri-windows/*.exe release/ 2>/dev/null || true
          ls -lh release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
